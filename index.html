<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Sniper: Global Offensive</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; cursor: none; font-family: 'Courier New', monospace; touch-action: none; }
        #scope-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background: radial-gradient(circle at center, transparent 150px, rgba(0,0,0,0.95) 152px);
            z-index: 10;
        }
        #scope-overlay::before, #scope-overlay::after {
            content: ''; position: absolute; background: rgba(255, 0, 0, 0.4);
        }
        #scope-overlay::before { top: 50%; left: 0; width: 100%; height: 1px; }
        #scope-overlay::after { left: 50%; top: 0; height: 100%; width: 1px; }
        
        #hud { 
            position: absolute; bottom: 20px; left: 20px; right: 20px; color: white; 
            font-size: 1.2rem; font-weight: bold; text-shadow: 1px 1px 0 #000; z-index: 11; 
            display: flex; justify-content: space-between; pointer-events: none;
        }
        .bar-container { width: 120px; height: 8px; background: #222; border: 1px solid #555; display: inline-block; vertical-align: middle; margin-left: 10px; }
        .hp-bar { width: 100%; height: 100%; background: #22c55e; transition: width 0.2s; }
        
        #controls {
            position: absolute; bottom: 80px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 12;
        }
        .ctrl-btn {
            width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3); color: white; font-weight: bold; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .ctrl-btn:active { background: rgba(255,255,255,0.3); }

        #reload-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fbbf24; font-size: 1.5rem; font-weight: 900; display: none;
            text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px #000;
        }
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 20;
        }
        button { padding: 12px 24px; font-size: 1rem; background: #22c55e; border: none; color: white; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="scope-overlay"></div>
    <div id="hud">
        <div>HP <div class="bar-container"><div class="hp-bar" id="hp-bar"></div></div></div>
        <div style="text-align: right">AMMO <span id="ammo" style="color:#fbbf24">10</span><br>SCORE <span id="score">0</span></div>
    </div>
    <div id="controls">
        <div class="ctrl-btn" onclick="game.scene.scenes[0].reload()">R</div>
    </div>
    <div id="reload-msg">RELOADING</div>
    <div id="game-over">
        <h1 style="font-size: 3rem; color: #ef4444;">MISSION FAILED</h1>
        <p>Targets Neutralized: <span id="final-score">0</span></p>
        <button onclick="location.reload()">RE-DEPLOY</button>
    </div>

    <script>
        class SniperGlobal extends Phaser.Scene {
            constructor() { super('SniperGlobal'); }

            create() {
                this.hp = 100;
                this.ammo = 10;
                this.score = 0;
                this.isReloading = false;
                this.peaking = false;
                
                // Mobile Input
                this.input.on('pointerdown', (p) => this.handleInput(p));
                this.input.on('pointermove', (p) => this.updateScope(p));

                this.createEnvironment();
                this.spawnSystem();
                
                document.getElementById('scope-overlay').style.display = 'block';
            }

            createEnvironment() {
                // Sky
                this.add.rectangle(400, 300, 800, 600, 0x020617);
                // Distant City
                for(let i=0; i<12; i++) {
                    const h = 80 + Math.random() * 120;
                    this.add.rectangle(i * 70, 600 - h/2, 60, h, 0x1e293b);
                }
                // Rooftop Ledge
                this.add.rectangle(400, 580, 800, 40, 0x334155);
            }

            spawnSystem() {
                // Spawn a target every 2.5 seconds
                this.time.addEvent({ 
                    delay: 2500, 
                    callback: () => {
                        if(!this.peaking) this.peekTarget();
                    }, 
                    loop: true 
                });
            }

            peekTarget() {
                this.peaking = true;
                const x = 100 + Math.random() * 600;
                const y = 280 + Math.random() * 150;
                
                // Enemy Container
                this.enemy = this.add.container(x, -50); // Start hidden below
                const body = this.add.rectangle(0, 15, 25, 45, 0x1e3a8a); // Blue uniform (CS style)
                const head = this.add.circle(0, -15, 10, 0xffd700); // Yellow skin
                const vest = this.add.rectangle(0, 15, 20, 30, 0x333);
                this.enemy.add([body, vest, head]);

                // Peek Animation
                this.tweens.add({
                    targets: this.enemy, y: y, duration: 400, ease: 'Power2',
                    onComplete: () => {
                        // Stay for 1.5s then hide
                        this.time.delayedCall(1500, () => {
                            this.tweens.add({
                                targets: this.enemy, y: -50, duration: 300,
                                onComplete: () => { 
                                    this.enemy.destroy(); 
                                    this.peaking = false; 
                                    this.takeDamage(5); // Penalty for missing the shot
                                }
                            });
                        });
                    }
                });

                // Hit Area
                this.enemy.setInteractive({ hitArea: new Phaser.Geom.Rectangle(-20, -30, 40, 60), hitAreaCallback: Phaser.Geom.Rectangle.Contains });
                this.enemy.on('pointerdown', () => this.hitEnemy());
            }

            handleInput(p) {
                if(this.isReloading) return;
                if(this.ammo <= 0) return this.reload();

                this.ammo--;
                this.updateUI();
                
                // Visual Flash
                const flash = this.add.circle(p.x, p.y, 20, 0xffffff, 0.5);
                this.tweens.add({ targets: flash, scale: 2, alpha: 0, duration: 100, onComplete: () => flash.destroy() });
            }

            hitEnemy() {
                if(!this.enemy) return;
                this.score++;
                this.updateUI();
                
                // Death effect
                this.tweens.add({ targets: this.enemy, alpha: 0, angle: 90, duration: 200, onComplete: () => {
                    this.enemy.destroy();
                    this.peaking = false;
                }});
            }

            takeDamage(amount) {
                this.hp -= amount;
                this.cameras.main.shake(100, 0.01);
                if(this.hp <= 0) {
                    this.hp = 0;
                    this.scene.pause();
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('final-score').innerText = this.score;
                }
                this.updateUI();
            }

            reload() {
                if(this.isReloading || this.ammo === 10) return;
                this.isReloading = true;
                document.getElementById('reload-msg').style.display = 'block';
                
                this.time.delayedCall(1200, () => {
                    this.ammo = 10;
                    this.isReloading = false;
                    document.getElementById('reload-msg').style.display = 'none';
                    this.updateUI();
                });
            }

            updateScope(p) {
                const s = document.getElementById('scope-overlay');
                s.style.background = `radial-gradient(circle at ${p.x}px ${p.y}px, transparent 140px, rgba(0,0,0,0.98) 142px)`;
            }

            updateUI() {
                document.getElementById('hp-bar').style.width = this.hp + '%';
                document.getElementById('ammo').innerText = this.ammo;
                document.getElementById('score').innerText = this.score;
            }
        }

        const game = new Phaser.Game({
            type: Phaser.AUTO, width: 800, height: 600, 
            scene: [SniperGlobal], scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
        });
    </script>
</body>
</html>
